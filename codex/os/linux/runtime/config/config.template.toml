model = "gpt-5.4"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.http_headers]
CONTEXT7_API_KEY = "__CONTEXT7_API_KEY__"

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.shadcn]
command = "npx"
args = ["-y", "shadcn@latest", "mcp"]

[mcp_servers.serena]
startup_timeout_sec = 60
command = "/usr/bin/bash"
args = [
  "-lc",
  '''
uid="$(id -u)"
export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/${uid}}"
if [[ -z "${DBUS_SESSION_BUS_ADDRESS:-}" && -S "${XDG_RUNTIME_DIR}/bus" ]]; then
  export DBUS_SESSION_BUS_ADDRESS="unix:path=${XDG_RUNTIME_DIR}/bus"
fi
if [[ -z "${WAYLAND_DISPLAY:-}" ]]; then
  for wayland_socket in "${XDG_RUNTIME_DIR}"/wayland-*; do
    if [[ -S "$wayland_socket" ]]; then
      export WAYLAND_DISPLAY="${wayland_socket##*/}"
      export XDG_SESSION_TYPE="${XDG_SESSION_TYPE:-wayland}"
      break
    fi
  done
fi
if [[ -z "${DISPLAY:-}" ]]; then
  for x_socket in /tmp/.X11-unix/X*; do
    if [[ -S "$x_socket" ]]; then
      export DISPLAY=":${x_socket##*/X}"
      export XDG_SESSION_TYPE="${XDG_SESSION_TYPE:-x11}"
      break
    fi
  done
fi
exec uvx --from git+https://github.com/oraios/serena serena start-mcp-server --context codex --enable-web-dashboard true --open-web-dashboard true
'''
]

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp"

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"

[features]

[mcp_servers.github.http_headers]
Authorization = "Bearer __GITHUB_MCP_TOKEN__"

[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true
