name: Bug report
description: Report a reproducible bug in the runtime mirror, scripts, docs, or skill baseline
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Affected module
      options:
        - docs
        - codex
        - scripts
        - skills
        - bootstrap
        - verification
        - other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact commands or steps to reproduce the problem
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Codex version, Node/npm/Python/uv/gh versions, and any relevant context
    validations:
      required: true
