name: Bug report
description: Report a reproducible bug or regression in the runtime mirror, docs, or automation stack
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail to reproduce the issue safely.
        Redact secrets, tokens, and private runtime state.
  - type: dropdown
    id: module
    attributes:
      label: Affected module
      options:
        - runtime payload
        - shared agent profiles
        - scripts
        - docs
        - CI / GitHub
        - other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15.x, Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or reproduction steps
      description: Exact commands or actions needed to reproduce the problem
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Codex, Node, npm, Python, uv, and gh versions plus any relevant context
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste relevant output with secrets redacted
      render: shell
    validations:
      required: true
